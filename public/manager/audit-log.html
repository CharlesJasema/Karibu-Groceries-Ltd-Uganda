<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGL | Audit Logs</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <a href="manager-dashboard.html" class="logo">
            <img src="../assets/logo/kgl-logo.png" alt="KGL Logo">
        </a>
        <nav class="nav-links">
            <a href="../index.html">🏠 Home</a>
            <span id="manager-branch"></span>
            <a href="managerProfile.html">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div class="d-flex justify-between align-center mb-3">
            <div>
                <h2>System Audit Logs</h2>
                <p style="color: var(--text-light);">Track all system activities and user actions for compliance.</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-secondary" onclick="loadAuditLogs()">
                    🔄 Refresh
                </button>
                <button class="btn btn-outline" onclick="window.location.href='manager-dashboard.html'">
                    ← Back to Dashboard
                </button>
            </div>
        </div>

        <!-- Audit Logs Table -->
        <div class="card">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>User</th>
                            <th>Action</th>
                            <th>Entity</th>
                            <th>IP Address</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="auditTable">
                        <tr>
                            <td colspan="6" style="text-align: center; color: var(--text-light);">
                                Loading audit logs...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/utils.js"></script>
    <script>
        async function init() {
            if (!checkAuth('manager')) return;
            
            const user = getUser();
            document.getElementById('manager-branch').textContent = user.branch || '';
            
            await loadAuditLogs();
        }

        async function loadAuditLogs() {
            try {
                const data = await apiRequest('/audit-logs?limit=100');
                const tbody = document.getElementById('auditTable');
                
                if (!data.data || data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-light);">No audit logs found</td></tr>';
                    return;
                }

                tbody.innerHTML = data.data.map(log => `
                    <tr>
                        <td>${formatDateTime(log.createdAt)}</td>
                        <td>
                            <strong>${log.user?.name || 'System'}</strong><br>
                            <span class="badge badge-info" style="font-size: 0.75rem;">${log.user?.role || 'system'}</span>
                        </td>
                        <td><code style="font-size: 0.85rem; background: var(--bg-light); padding: 0.2rem 0.4rem; border-radius: 4px;">${log.action}</code></td>
                        <td>${log.entity}</td>
                        <td style="font-family: monospace; font-size: 0.85rem;">${log.ip || 'N/A'}</td>
                        <td style="font-size: 0.85rem; max-width: 200px;">
                            <details>
                                <summary style="cursor: pointer; color: var(--primary-green);">View Details</summary>
                                <pre style="font-size: 0.75rem; margin-top: 0.5rem; background: var(--bg-light); padding: 0.5rem; border-radius: 4px; overflow-x: auto;">${JSON.stringify(log.details || {}, null, 2)}</pre>
                            </details>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                showToast(error.message || 'Failed to load audit logs', 'error');
                document.getElementById('auditTable').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Failed to load audit logs</td></tr>';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
