<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGL | Reset Password</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <!-- Logo -->
          <header class="center-logo-header">
            <a href="./login.html" class="logo">
              <img src="../assets/logo/kgl-logo.png" alt="kgl Logo" />
            </a>
            <style>
              .center-logo-header {
                justify-content: center !important;
              }

              .center-logo-header .logo {
                font-size: 1.8rem;
              }

              .center-logo-header .logo img {
                height: 75px;
              }
            </style>
          </header>
          <div class="login-title">Reset Password</div>
          <div class="login-sub">
            Enter the OTP sent to your email and choose a new password.
          </div>
        </div>

        <div id="alert-box"></div>

        <div class="form-group">
          <label for="otp">One-Time Code (OTP)</label>
          <input type="text" id="otp" placeholder="6-digit code" required />
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            placeholder="New strong password"
            required
          />
        </div>

        <button class="btn-login" id="btn-reset" onclick="resetPassword()">
          Reset Password
        </button>
      </div>
    </div>

    <script>
      async function resetPassword() {
        const otp = document.getElementById("otp").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();
        const alertBox = document.getElementById("alert-box");
        const btn = document.getElementById("btn-reset");

        const email = localStorage.getItem("kgl_reset_email");
        if (!email) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Missing email context. Please start from the "Forgot password" page.</div>';
          return;
        }

        if (!otp || !newPassword) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Please enter the OTP and your new password.</div>';
          return;
        }

        btn.textContent = "Resetting…";
        btn.disabled = true;
        alertBox.innerHTML = "";

        try {
          const res = await fetch("/users/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp, newPassword }),
          });
          const data = await res.json();

          if (res.ok && data.success) {
            alertBox.innerHTML =
              '<div class="alert">Password reset successful. You can now login.</div>';
            localStorage.removeItem("kgl_reset_email");
            setTimeout(() => {
              window.location.href = "./login.html";
            }, 1200);
          } else {
            alertBox.innerHTML =
              '<div class="alert alert-error">' +
              (data.message ||
                "Unable to reset password. Check OTP and try again.") +
              "</div>";
          }
        } catch (e) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Server error. Please try again.</div>';
        } finally {
          btn.textContent = "Reset Password";
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
