<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGL | Account Recovery</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <!-- Logo -->
          <header class="center-logo-header">
            <a href="./login.html" class="logo">
              <img src="../assets/logo/kgl-logo.png" alt="kgl Logo" />
            </a>
            <style>
              .center-logo-header {
                justify-content: center !important;
              }

              .center-logo-header .logo {
                font-size: 1.8rem;
              }

              .center-logo-header .logo img {
                height: 75px;
              }
            </style>
          </header>
          <div class="login-title">Account Recovery</div>
          <div class="login-sub">
            Request a one-time code to reset your password
          </div>
        </div>

        <div id="alert-box"></div>

        <div class="form-group">
          <label for="email">Registered Email</label>
          <input type="email" id="email" placeholder="you@kgl.co.ug" required />
        </div>

        <button class="btn-login" id="btn-send" onclick="sendOtp()">
          Send OTP
        </button>

        <div style="margin-top: 1rem; font-size: 0.85rem; text-align: center">
          <a href="./login.html">Back to Login</a>
        </div>
      </div>
    </div>

    <script>
      async function sendOtp() {
        const emailInput = document.getElementById("email");
        const alertBox = document.getElementById("alert-box");
        const btn = document.getElementById("btn-send");

        const email = emailInput.value.trim();
        if (!email) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Please enter your registered email address.</div>';
          return;
        }

        btn.textContent = "Sending…";
        btn.disabled = true;
        alertBox.innerHTML = "";

        try {
          const res = await fetch("/users/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await res.json();

          if (res.ok && data.success) {
            alertBox.innerHTML =
              '<div class="alert">If the email exists, an OTP has been generated.</div>';
            localStorage.setItem("kgl_reset_email", email);
            setTimeout(() => {
              window.location.href = "./reset-password.html";
            }, 1200);
          } else {
            alertBox.innerHTML =
              '<div class="alert alert-error">' +
              (data.message || "Unable to generate OTP. Try again.") +
              "</div>";
          }
        } catch (e) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Server error. Please try again.</div>';
        } finally {
          btn.textContent = "Send OTP";
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
