<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGL | Account Recovery</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      .resend-timer {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: var(--text-light);
      }
      .resend-button {
        background: none;
        border: none;
        color: var(--primary-gold);
        cursor: pointer;
        text-decoration: underline;
        font-size: 0.9rem;
        padding: 0;
      }
      .resend-button:disabled {
        color: var(--text-light);
        cursor: not-allowed;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <!-- Logo -->
          <header class="center-logo-header">
            <a href="../index.html" class="logo">
              <img src="../assets/logo/kgl-logo.png" alt="kgl Logo" />
            </a>
            <style>
              .center-logo-header {
                justify-content: center !important;
              }

              .center-logo-header .logo {
                font-size: 1.8rem;
              }

              .center-logo-header .logo img {
                height: 75px;
              }
            </style>
          </header>
          <div class="login-title">Account Recovery</div>
          <div class="login-sub">
            Request a one-time code to reset your password
          </div>
        </div>

        <div id="alert-box"></div>

        <div class="form-group">
          <label for="method">Recovery Method</label>
          <select id="method" onchange="updateInputField()">
            <option value="email">Email Address</option>
            <option value="contact">Phone Number</option>
          </select>
        </div>

        <div class="form-group" id="email-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="Enter your registered email" 
            required 
          />
        </div>

        <div class="form-group" id="contact-group" style="display: none;">
          <label for="contact">Phone Number</label>
          <input 
            type="tel" 
            id="contact" 
            placeholder="Enter your registered phone number" 
            required 
          />
          <small style="color: var(--text-light); font-size: 0.85rem;">
            Format: +256700000000 or 0700000000
          </small>
        </div>

        <button class="btn-login" id="btn-send" onclick="sendOtp()">
          Send OTP
        </button>

        <div class="resend-timer" id="resend-section" style="display: none;">
          <span id="timer-text">Didn't receive the code?</span>
          <button 
            class="resend-button" 
            id="resend-btn" 
            onclick="resendOtp()" 
            disabled
          >
            Resend OTP (<span id="countdown">60</span>s)
          </button>
        </div>

        <div style="margin-top: 1rem; font-size: 0.85rem; text-align: center">
          <a href="../index.html">Back to Home</a> | <a href="./login.html">Back to Login</a>
        </div>
      </div>
    </div>

    <script>
      let countdownTimer = null;
      let lastMethod = null;
      let lastValue = null;

      function updateInputField() {
        const method = document.getElementById('method').value;
        const emailGroup = document.getElementById('email-group');
        const contactGroup = document.getElementById('contact-group');
        
        if (method === 'email') {
          emailGroup.style.display = 'block';
          contactGroup.style.display = 'none';
          document.getElementById('email').required = true;
          document.getElementById('contact').required = false;
        } else {
          emailGroup.style.display = 'none';
          contactGroup.style.display = 'block';
          document.getElementById('email').required = false;
          document.getElementById('contact').required = true;
        }
      }

      function startResendTimer() {
        const resendSection = document.getElementById('resend-section');
        const resendBtn = document.getElementById('resend-btn');
        const countdownSpan = document.getElementById('countdown');
        
        resendSection.style.display = 'block';
        resendBtn.disabled = true;
        
        let timeLeft = 60;
        countdownSpan.textContent = timeLeft;
        
        // Clear any existing timer
        if (countdownTimer) {
          clearInterval(countdownTimer);
        }
        
        countdownTimer = setInterval(() => {
          timeLeft--;
          countdownSpan.textContent = timeLeft;
          
          if (timeLeft <= 0) {
            clearInterval(countdownTimer);
            resendBtn.disabled = false;
            resendBtn.innerHTML = 'Resend OTP';
          }
        }, 1000);
      }

      async function sendOtp() {
        const method = document.getElementById('method').value;
        const alertBox = document.getElementById('alert-box');
        const btn = document.getElementById('btn-send');

        let value;
        if (method === 'email') {
          value = document.getElementById('email').value.trim();
          if (!value) {
            alertBox.innerHTML = '<div class="alert alert-error">Please enter your email address.</div>';
            return;
          }
        } else {
          value = document.getElementById('contact').value.trim();
          if (!value) {
            alertBox.innerHTML = '<div class="alert alert-error">Please enter your phone number.</div>';
            return;
          }
        }

        btn.textContent = "Sending…";
        btn.disabled = true;
        alertBox.innerHTML = "";

        try {
          const requestBody = method === 'email' 
            ? { email: value }
            : { contact: value };

          const res = await fetch("/users/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody),
          });
          const data = await res.json();

          if (res.ok && data.success) {
            const methodText = method === 'email' ? 'email' : 'phone number';
            alertBox.innerHTML =
              `<div class="alert alert-success">✓ OTP sent to your ${methodText}. Please check and enter the code.</div>`;
            
            // Store for resend and reset page
            lastMethod = method;
            lastValue = value;
            localStorage.setItem("kgl_reset_method", method);
            localStorage.setItem("kgl_reset_value", value);
            
            // Start resend timer
            startResendTimer();
            
            // Redirect after 3 seconds
            setTimeout(() => {
              window.location.href = "./reset-password.html";
            }, 3000);
          } else {
            alertBox.innerHTML =
              '<div class="alert alert-error">' +
              (data.message || "Unable to send OTP. Please try again.") +
              "</div>";
          }
        } catch (e) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Server error. Please try again.</div>';
        } finally {
          btn.textContent = "Send OTP";
          btn.disabled = false;
        }
      }

      async function resendOtp() {
        if (!lastMethod || !lastValue) {
          const method = document.getElementById('method').value;
          if (method === 'email') {
            lastValue = document.getElementById('email').value.trim();
          } else {
            lastValue = document.getElementById('contact').value.trim();
          }
          lastMethod = method;
        }

        if (!lastValue) {
          alert('Please enter your email or phone number first.');
          return;
        }

        const alertBox = document.getElementById('alert-box');
        const resendBtn = document.getElementById('resend-btn');
        
        resendBtn.disabled = true;
        alertBox.innerHTML = '<div class="alert">Resending OTP...</div>';

        try {
          const requestBody = lastMethod === 'email' 
            ? { email: lastValue }
            : { contact: lastValue };

          const res = await fetch("/users/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody),
          });
          const data = await res.json();

          if (res.ok && data.success) {
            const methodText = lastMethod === 'email' ? 'email' : 'phone number';
            alertBox.innerHTML =
              `<div class="alert alert-success">✓ OTP resent to your ${methodText}.</div>`;
            
            // Restart timer
            startResendTimer();
          } else {
            alertBox.innerHTML =
              '<div class="alert alert-error">' +
              (data.message || "Unable to resend OTP. Try again.") +
              "</div>";
            resendBtn.disabled = false;
          }
        } catch (e) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Server error. Please try again.</div>';
          resendBtn.disabled = false;
        }
      }

      // Clean up timer on page unload
      window.addEventListener('beforeunload', () => {
        if (countdownTimer) {
          clearInterval(countdownTimer);
        }
      });
    </script>
  </body>
</html>
