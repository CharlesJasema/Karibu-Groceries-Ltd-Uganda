<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGL Groceries – Sign In</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <!-- Logo -->
          <header class="center-logo-header">
            <a href="../index.html" class="logo">
              <img src="../assets/logo/kgl-logo.png" alt="kgl Logo" />
            </a>
            <style>
              .center-logo-header {
                justify-content: center !important;
              }

              .center-logo-header .logo {
                font-size: 1.8rem;
              }

              .center-logo-header .logo img {
                height: 75px;
              }
            </style>
          </header>
          <div class="login-title">KGL | Karibu Groceries LTD</div>
          <div class="login-sub">Wholesale Produce Management System</div>
        </div>

        <div id="alert-box"></div>

        <div class="form-group">
          <label for="role">Role</label>
          <select id="role">
            <option value="">Select your role</option>
            <option value="manager">Manager</option>
            <option value="agent">Sales Agent</option>
            <option value="director">Director</option>
          </select>
        </div>

        <div class="form-group" id="branch-group">
          <label for="branch">Branch</label>
          <select id="branch">
            <option value="">Select branch</option>
            <option value="Maganjo">Maganjo</option>
            <option value="Matugga">Matugga</option>
          </select>
        </div>

        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <div class="password-input-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
              <svg id="eye-icon" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg id="eye-off-icon" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display: none;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            </button>
          </div>
          <div id="password-strength" class="password-strength" style="display: none;">
            <div class="strength-bar">
              <div id="strength-bar-fill" class="strength-bar-fill"></div>
            </div>
            <div id="strength-text" class="strength-text"></div>
            <ul id="password-requirements" class="password-requirements">
              <li id="req-length" class="requirement">
                <span class="req-icon">○</span> At least 6 characters
              </li>
              <li id="req-uppercase" class="requirement">
                <span class="req-icon">○</span> One uppercase letter
              </li>
              <li id="req-lowercase" class="requirement">
                <span class="req-icon">○</span> One lowercase letter
              </li>
              <li id="req-number" class="requirement">
                <span class="req-icon">○</span> One number
              </li>
            </ul>
          </div>
        </div>
        
        <div style="text-align: center; margin-bottom: 1rem;">
          <a href="forgot-password.html" style="color: var(--primary-gold); text-decoration: none; font-size: 0.9rem;">
            Forgot Password?
          </a>
        </div>

        <button class="btn-login" onclick="doLogin()" id="btn-login">
          <svg
            width="16"
            height="16"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"
            />
          </svg>
          Sign In
        </button>
      </div>
      <div class="kgl-tagline">
        © 2026 Karibu Groceries LTD · Maganjo &amp; Matugga
      </div>
    </div>

    <script>
      const API = "";

      // Password toggle functionality
      function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeOffIcon = document.getElementById('eye-off-icon');
        
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          eyeIcon.style.display = 'none';
          eyeOffIcon.style.display = 'block';
        } else {
          passwordInput.type = 'password';
          eyeIcon.style.display = 'block';
          eyeOffIcon.style.display = 'none';
        }
      }

      // Password strength checker
      function checkPasswordStrength(password) {
        const requirements = {
          length: password.length >= 6,
          uppercase: /[A-Z]/.test(password),
          lowercase: /[a-z]/.test(password),
          number: /[0-9]/.test(password)
        };
        
        const metRequirements = Object.values(requirements).filter(Boolean).length;
        
        let strength = 'weak';
        let color = '#ef4444';
        let width = '25%';
        
        if (metRequirements === 4) {
          strength = 'strong';
          color = '#22c55e';
          width = '100%';
        } else if (metRequirements === 3) {
          strength = 'good';
          color = '#f59e0b';
          width = '75%';
        } else if (metRequirements === 2) {
          strength = 'fair';
          color = '#eab308';
          width = '50%';
        }
        
        return { strength, color, width, requirements };
      }

      // Update password strength indicator
      function updatePasswordStrength() {
        const password = document.getElementById('password').value;
        const strengthContainer = document.getElementById('password-strength');
        const strengthBarFill = document.getElementById('strength-bar-fill');
        const strengthText = document.getElementById('strength-text');
        
        if (password.length === 0) {
          strengthContainer.style.display = 'none';
          return;
        }
        
        strengthContainer.style.display = 'block';
        
        const { strength, color, width, requirements } = checkPasswordStrength(password);
        
        strengthBarFill.style.width = width;
        strengthBarFill.style.backgroundColor = color;
        strengthText.textContent = `Password strength: ${strength.charAt(0).toUpperCase() + strength.slice(1)}`;
        strengthText.style.color = color;
        
        // Update requirement indicators
        document.getElementById('req-length').className = requirements.length ? 'requirement met' : 'requirement';
        document.getElementById('req-uppercase').className = requirements.uppercase ? 'requirement met' : 'requirement';
        document.getElementById('req-lowercase').className = requirements.lowercase ? 'requirement met' : 'requirement';
        document.getElementById('req-number').className = requirements.number ? 'requirement met' : 'requirement';
        
        // Update icons
        document.querySelectorAll('.requirement').forEach(req => {
          const icon = req.querySelector('.req-icon');
          if (req.classList.contains('met')) {
            icon.textContent = '✓';
            icon.style.color = '#22c55e';
          } else {
            icon.textContent = '○';
            icon.style.color = '#94a3b8';
          }
        });
      }

      // Add event listener for password input
      document.addEventListener('DOMContentLoaded', () => {
        const passwordInput = document.getElementById('password');
        passwordInput.addEventListener('input', updatePasswordStrength);
        passwordInput.addEventListener('focus', updatePasswordStrength);
      });

      async function doLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const role = document.getElementById("role").value;
        const branch = document.getElementById("branch").value;
        const btn = document.getElementById("btn-login");
        const alertBox = document.getElementById("alert-box");

        if (!username || !password) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Please enter username and password.</div>';
          return;
        }

        if ((role === "manager" || role === "agent") && !branch) {
          alertBox.innerHTML =
            '<div class="alert alert-error">Please select your branch.</div>';
          return;
        }

        btn.textContent = "Signing in…";
        btn.disabled = true;

        const requestBody = {
          username,
          password,
          role: role || undefined,
          branch: role === "director" ? undefined : branch || undefined,
        };

        console.log("=== LOGIN ATTEMPT ===");
        console.log("Current URL:", window.location.href);
        console.log("Origin:", window.location.origin);
        console.log("Request body:", requestBody);
        console.log("Fetch URL:", "/users/login");
        console.log("Full URL:", window.location.origin + "/users/login");

        try {
          const res = await fetch(`/users/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody),
          });
          
          console.log("Response status:", res.status);
          console.log("Response headers:", Object.fromEntries(res.headers.entries()));
          
          // Check if response has content
          const contentType = res.headers.get("content-type");
          console.log("Content-Type:", contentType);
          
          if (!contentType || !contentType.includes("application/json")) {
            throw new Error(`Server returned ${contentType || 'no content'} instead of JSON. Status: ${res.status}`);
          }
          
          const responseText = await res.text();
          console.log("Response text:", responseText);
          
          if (!responseText) {
            throw new Error("Server returned empty response");
          }
          
          const data = JSON.parse(responseText);
          console.log("Response data:", data);

          if (res.status === 200 && data.success) {
            // Store session
            localStorage.setItem("kgl_token", data.token);
            localStorage.setItem("kgl_user", JSON.stringify(data.user));

            // Route by role
            const userRole = data.user.role;
            if (userRole === "manager")
              window.location.href = "/manager/manager-dashboard.html";
            else if (userRole === "agent")
              window.location.href = "/salesAgent/agent-dashboard.html";
            else if (userRole === "director")
              window.location.href = "/director/director-dashboard.html";
            else window.location.href = "/";
          } else if (res.status === 401) {
            alertBox.innerHTML =
              '<div class="alert alert-error">⚠ ' +
              (data.message ||
                "User does not exist or password is incorrect.") +
              "</div>";
          } else if (res.status === 429) {
            alertBox.innerHTML =
              '<div class="alert alert-error">⚠ Too many login attempts. Please wait 15 minutes and try again.</div>';
          } else {
            alertBox.innerHTML =
              '<div class="alert alert-error">⚠ ' +
              (data.message || "Login failed. Please try again.") +
              "</div>";
          }
        } catch (error) {
          console.error("Login error:", error);
          alertBox.innerHTML =
            '<div class="alert alert-error">⚠ Unable to connect to server.<br>Error: ' + error.message + '<br><br>Check browser console (F12) for details.</div>';
        } finally {
          btn.textContent = "Sign In";
          btn.disabled = false;
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      // Redirect if already logged in
      if (localStorage.getItem("kgl_token")) {
        const user = JSON.parse(localStorage.getItem("kgl_user") || "{}");
        if (user.role === "manager")
          window.location.href = "/manager/manager-dashboard.html";
        else if (user.role === "agent")
          window.location.href = "/salesAgent/agent-dashboard.html";
        else if (user.role === "director")
          window.location.href = "/director/director-dashboard.html";
      }

      // Toggle branch selector based on role
      const roleSelect = document.getElementById("role");
      const branchGroup = document.getElementById("branch-group");
      roleSelect.addEventListener("change", () => {
        if (roleSelect.value === "director") {
          branchGroup.style.display = "none";
        } else {
          branchGroup.style.display = "block";
        }
      });

      // Apply preferred branch/role from landing page, if present
      try {
        const prefBranch = localStorage.getItem("kgl_preferred_branch");
        const prefRole = localStorage.getItem("kgl_preferred_role");
        if (prefRole) {
          roleSelect.value = prefRole;
        }
        if (prefRole === "director") {
          branchGroup.style.display = "none";
        } else {
          branchGroup.style.display = "block";
        }
        if (prefBranch) {
          const branchSelect = document.getElementById("branch");
          branchSelect.value = prefBranch;
        }
      } catch (e) {
        // ignore
      }
    </script>
  </body>
</html>
