<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGL | Agent Profile</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <a href="agent-dashboard.html" class="logo">
            <img src="../assets/logo/kgl-logo.png" alt="KGL Logo">
        </a>
        <nav class="nav-links">
            <a href="../index.html">🏠 Home</a>
            <span id="agent-branch"></span>
            <a href="agent-dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div class="d-flex justify-between align-center mb-3">
            <div>
                <h2>My Profile</h2>
                <p style="color: var(--text-light);">Manage your account information.</p>
            </div>
            <button class="btn btn-outline" onclick="window.location.href='agent-dashboard.html'">← Back</button>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1.5fr; gap: 2rem;">
            <div class="card text-center">
                <div style="position: relative; width: 120px; height: 120px; margin: 0 auto 1.5rem;">
                    <img id="profile-photo" src="" alt="Profile" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; display: none; border: 3px solid var(--primary-gold);">
                    <div id="profile-initials" style="width: 120px; height: 120px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; font-weight: 700;">
                        <span id="initials">A</span>
                    </div>
                </div>
                <div class="d-flex gap-1" style="justify-content: center; margin-bottom: 1rem;">
                    <label for="photoUpload" class="btn btn-sm btn-primary" style="cursor: pointer;">
                        Upload Photo
                    </label>
                    <input type="file" id="photoUpload" accept="image/jpeg,image/png,image/gif" style="display: none;" onchange="uploadPhoto(event)">
                    <button class="btn btn-sm btn-danger" id="deletePhotoBtn" onclick="deletePhoto()" style="display: none;">
                        Delete Photo
                    </button>
                </div>
                <h3 id="profile-name">Sales Agent</h3>
                <p style="color: var(--text-light); margin-bottom: 0.5rem;"><span class="badge badge-info" id="profile-role">Agent</span></p>
                <p style="color: var(--text-light);"><span class="badge badge-default" id="profile-branch">Branch</span></p>
                <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border-light);">
                <div style="text-align: left;">
                    <p style="margin-bottom: 0.75rem;"><strong>Username:</strong> <span id="profile-username">-</span></p>
                    <p style="margin-bottom: 0.75rem;"><strong>Contact:</strong> <span id="profile-contact">-</span></p>
                    <p style="margin-bottom: 0.75rem;"><strong>Location:</strong> <span id="profile-location">-</span></p>
                    <p style="margin-bottom: 0;"><strong>Status:</strong> <span class="badge badge-success">Active</span></p>
                </div>
            </div>

            <div>
                <div class="card mb-3">
                    <h3 class="mb-2">Update Profile</h3>
                    <div id="profile-alert"></div>
                    <form id="profileForm" onsubmit="updateProfile(event)">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" required minlength="3">
                        </div>
                        <div class="form-group">
                            <label for="contact">Contact Number</label>
                            <input type="tel" id="contact" required>
                        </div>
                        <div class="form-group">
                            <label for="location">Location (Optional)</label>
                            <input type="text" id="location" placeholder="Your location">
                        </div>
                        <button type="submit" class="btn btn-primary" id="profileBtn">Update Profile</button>
                    </form>
                </div>

                <div class="card">
                    <h3 class="mb-2">Change Password</h3>
                    <div id="password-alert"></div>
                    <form id="passwordForm" onsubmit="changePassword(event)">
                        <div class="form-group">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary" id="passwordBtn">Change Password</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/utils.js"></script>
    <script>
        async function init() {
            if (!checkAuth('agent')) return;
            const user = getUser();
            document.getElementById('agent-branch').textContent = user.branch || '';
            document.getElementById('profile-name').textContent = user.name || 'Sales Agent';
            document.getElementById('profile-role').textContent = user.role || 'agent';
            document.getElementById('profile-branch').textContent = user.branch || '';
            document.getElementById('profile-username').textContent = user.username || '-';
            document.getElementById('profile-contact').textContent = user.contact || '-';
            document.getElementById('profile-location').textContent = user.location || 'Not set';
            
            const initials = (user.name || 'A').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('initials').textContent = initials;
            
            document.getElementById('name').value = user.name || '';
            document.getElementById('contact').value = user.contact || '';
            document.getElementById('location').value = user.location || '';
            
            // Load profile photo if exists
            if (user.photo) {
                const photoImg = document.getElementById('profile-photo');
                // Construct full photo URL - handle both filename and full URL
                let photoUrl;
                if (user.photo.startsWith('http') || user.photo.startsWith('/uploads/')) {
                    photoUrl = user.photo;
                } else {
                    photoUrl = `/uploads/profiles/${user.photo}`;
                }
                photoImg.src = photoUrl;
                photoImg.style.display = 'block';
                document.getElementById('profile-initials').style.display = 'none';
                document.getElementById('deletePhotoBtn').style.display = 'inline-flex';
            }
        }

        async function uploadPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validate file type
            const validTypes = ['image/jpeg', 'image/png', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showToast('Please upload a JPEG, PNG, or GIF image', 'error');
                return;
            }

            // Validate file size (5MB max)
            if (file.size > 5 * 1024 * 1024) {
                showToast('Image size must be less than 5MB', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('photo', file);

            try {
                const token = localStorage.getItem('kgl_token');
                const response = await fetch(`${API_BASE_URL}/profile/me/photo`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to upload photo');
                }

                const data = await response.json();
                
                // Update localStorage with photo filename (not URL)
                const user = getUser();
                user.photo = data.data.photo; // Store filename, not URL
                localStorage.setItem('kgl_user', JSON.stringify(user));

                // Update UI with full URL
                const photoImg = document.getElementById('profile-photo');
                photoImg.src = data.data.photoUrl;
                photoImg.style.display = 'block';
                document.getElementById('profile-initials').style.display = 'none';
                document.getElementById('deletePhotoBtn').style.display = 'inline-flex';

                showToast('Photo uploaded successfully!', 'success');
            } catch (error) {
                showToast(error.message || 'Failed to upload photo', 'error');
            }

            // Reset file input
            event.target.value = '';
        }

        async function deletePhoto() {
            if (!confirm('Are you sure you want to delete your profile photo?')) {
                return;
            }

            try {
                await apiRequest('/profile/me/photo', {
                    method: 'DELETE'
                });

                // Update localStorage
                const user = getUser();
                delete user.photo;
                localStorage.setItem('kgl_user', JSON.stringify(user));

                // Update UI
                document.getElementById('profile-photo').style.display = 'none';
                document.getElementById('profile-initials').style.display = 'flex';
                document.getElementById('deletePhotoBtn').style.display = 'none';

                showToast('Photo deleted successfully!', 'success');
            } catch (error) {
                showToast(error.message || 'Failed to delete photo', 'error');
            }
        }

        async function updateProfile(event) {
            event.preventDefault();
            const alertBox = document.getElementById('profile-alert');
            const submitBtn = document.getElementById('profileBtn');
            const profileData = { 
                name: document.getElementById('name').value.trim(), 
                contact: document.getElementById('contact').value.trim(),
                location: document.getElementById('location').value.trim()
            };
            setLoading(submitBtn, true);
            alertBox.innerHTML = '';
            try {
                const data = await apiRequest('/profile/me', { method: 'PUT', body: JSON.stringify(profileData) });
                const user = getUser();
                // Update user with returned data
                const updatedUser = { ...user, ...profileData };
                localStorage.setItem('kgl_user', JSON.stringify(updatedUser));
                showToast('Profile updated successfully!', 'success');
                setTimeout(() => window.location.reload(), 1000);
            } catch (error) {
                alertBox.innerHTML = `<div class="alert alert-error">${error.message || 'Failed to update profile'}</div>`;
            } finally {
                setLoading(submitBtn, false);
            }
        }

        async function changePassword(event) {
            event.preventDefault();
            const alertBox = document.getElementById('password-alert');
            const submitBtn = document.getElementById('passwordBtn');
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (newPassword !== confirmPassword) {
                alertBox.innerHTML = '<div class="alert alert-error">New passwords do not match</div>';
                return;
            }
            setLoading(submitBtn, true);
            alertBox.innerHTML = '';
            try {
                await apiRequest('/users/me/password', { method: 'PATCH', body: JSON.stringify({ currentPassword, newPassword }) });
                showToast('Password changed successfully!', 'success');
                clearForm('passwordForm');
            } catch (error) {
                alertBox.innerHTML = `<div class="alert alert-error">${error.message || 'Failed to change password'}</div>`;
            } finally {
                setLoading(submitBtn, false);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
