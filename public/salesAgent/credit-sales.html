<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGL | Record Credit Sale</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <a href="agent-dashboard.html" class="logo">
            <img src="../assets/logo/kgl-logo.png" alt="KGL Logo">
        </a>
        <nav class="nav-links">
            <a href="../index.html">🏠 Home</a>
            <span id="agent-branch"></span>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div class="d-flex justify-between align-center mb-3">
            <div>
                <h2>Record Credit Sale</h2>
                <p style="color: var(--text-light);">Issue credit to trusted buyers with deferred payment terms.</p>
            </div>
            <button class="btn btn-outline" onclick="window.location.href='agent-dashboard.html'">
                ← Back to Dashboard
            </button>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1.5fr; gap: 2rem;">
            <!-- Credit Sale Form -->
            <div class="card">
                <h3 class="mb-2">Credit Sale Details</h3>
                <div id="alert-box"></div>
                
                <form id="creditSaleForm" onsubmit="submitCreditSale(event)">
                    <div class="form-group">
                        <label for="buyerName">Buyer Name *</label>
                        <input type="text" id="buyerName" required minlength="2" placeholder="Full name">
                    </div>

                    <div class="form-group">
                        <label for="nin">National ID (NIN) *</label>
                        <input type="text" id="nin" required placeholder="National ID number">
                    </div>

                    <div class="form-group">
                        <label for="location">Location *</label>
                        <input type="text" id="location" required minlength="2" placeholder="Address/Location">
                    </div>

                    <div class="form-group">
                        <label for="contact">Contact Number *</label>
                        <input type="tel" id="contact" required placeholder="+256...">
                    </div>

                    <div class="form-group">
                        <label for="produceName">Produce Name *</label>
                        <input type="text" id="produceName" required placeholder="e.g., Beans">
                    </div>

                    <div class="form-group">
                        <label for="produceType">Produce Type *</label>
                        <input type="text" id="produceType" required minlength="2" placeholder="e.g., Red Beans">
                    </div>

                    <div class="form-group">
                        <label for="tonnage">Quantity (kg) *</label>
                        <input type="number" id="tonnage" required min="0.1" step="0.1" placeholder="Quantity">
                    </div>

                    <div class="form-group">
                        <label for="amountDue">Amount Due (UGX) *</label>
                        <input type="number" id="amountDue" required min="10000" placeholder="Min 10,000">
                    </div>

                    <div class="form-group">
                        <label for="salesAgent">Sales Agent *</label>
                        <input type="text" id="salesAgent" required minlength="2" placeholder="Your name">
                    </div>

                    <div class="form-group">
                        <label for="dispatchDate">Dispatch Date *</label>
                        <input type="date" id="dispatchDate" required>
                    </div>

                    <div class="form-group">
                        <label for="dueDate">Payment Due Date *</label>
                        <input type="date" id="dueDate" required>
                    </div>

                    <div class="form-group">
                        <label for="procurementId">Procurement ID (Optional)</label>
                        <input type="text" id="procurementId" placeholder="Link to procurement">
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Record Credit Sale
                    </button>
                </form>
            </div>

            <!-- Recent Credit Sales -->
            <div class="card">
                <div class="d-flex justify-between align-center mb-2">
                    <h3>Recent Credit Sales</h3>
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="showDeleted" onchange="loadRecentCredits()">
                        <span>Show Deleted</span>
                    </label>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Buyer</th>
                                <th>Produce</th>
                                <th>Amount (UGX)</th>
                                <th>Due Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="creditTable">
                            <tr>
                                <td colspan="6" style="text-align: center; color: var(--text-light);">
                                    Loading credit sales...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Edit Credit Sale Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>Edit Credit Sale</h3>
                <button class="btn-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="edit-alert-box"></div>
                <form id="editCreditForm" onsubmit="updateSale(event)">
                    <input type="hidden" id="edit-saleId">
                    <div class="form-group">
                        <label for="edit-buyerName">Buyer Name *</label>
                        <input type="text" id="edit-buyerName" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-nin">National ID (NIN) *</label>
                        <input type="text" id="edit-nin" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-location">Location *</label>
                        <input type="text" id="edit-location" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-contact">Contact Number *</label>
                        <input type="tel" id="edit-contact" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-produceName">Produce Name *</label>
                        <input type="text" id="edit-produceName" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-produceType">Produce Type *</label>
                        <input type="text" id="edit-produceType" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-tonnage">Quantity (kg) *</label>
                        <input type="number" id="edit-tonnage" required min="0.1" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="edit-amountDue">Amount Due (UGX) *</label>
                        <input type="number" id="edit-amountDue" required min="10000">
                    </div>
                    <div class="form-group">
                        <label for="edit-salesAgent">Sales Agent *</label>
                        <input type="text" id="edit-salesAgent" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-dispatchDate">Dispatch Date *</label>
                        <input type="date" id="edit-dispatchDate" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-dueDate">Payment Due Date *</label>
                        <input type="date" id="edit-dueDate" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="updateBtn">Update Sale</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script>
        async function init() {
            if (!checkAuth('agent')) return;
            
            const user = getUser();
            document.getElementById('agent-branch').textContent = user.branch || '';
            document.getElementById('salesAgent').value = user.name || '';
            
            // Set default dates
            const now = new Date();
            document.getElementById('dispatchDate').valueAsDate = now;
            
            const dueDate = new Date();
            dueDate.setDate(dueDate.getDate() + 30); // 30 days from now
            document.getElementById('dueDate').valueAsDate = dueDate;
            
            await loadRecentCredits();
        }

        async function loadRecentCredits() {
            try {
                const showDeletedCheckbox = document.getElementById('showDeleted');
                const showDeleted = showDeletedCheckbox ? showDeletedCheckbox.checked : false;
                
                // Build query string
                const queryParams = new URLSearchParams({
                    limit: '50'
                });
                
                if (showDeleted) {
                    queryParams.append('showDeleted', 'true');
                }
                
                const data = await apiRequest(`/sales/credit?${queryParams.toString()}`);
                const tbody = document.getElementById('creditTable');
                
                // API returns data.data, not data.creditSales
                const creditSales = data.data || [];
                
                if (creditSales.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-light);">No credit sales found</td></tr>';
                    return;
                }

                tbody.innerHTML = creditSales.map(credit => {
                    const isPaid = credit.paid;
                    const isOverdue = !isPaid && new Date(credit.dueDate) < new Date();
                    const isDeleted = credit.deleted === true;
                    
                    return `
                        <tr style="${isDeleted ? 'opacity: 0.6; background: #f9f9f9;' : ''}">
                            <td><strong>${credit.buyerName}</strong></td>
                            <td>${credit.produceName}</td>
                            <td>${formatCurrency(credit.amountDue)}</td>
                            <td>${formatDate(credit.dueDate)}</td>
                            <td>
                                <span class="badge ${isPaid ? 'badge-success' : isOverdue ? 'badge-danger' : 'badge-warning'}">
                                    ${isPaid ? 'Paid' : isOverdue ? 'Overdue' : 'Pending'}
                                </span>
                            </td>
                            <td>
                                ${isDeleted ? `
                                    <button class="btn btn-sm btn-success" onclick="restoreSale('${credit._id}')">Restore</button>
                                ` : `
                                    <button class="btn btn-sm btn-primary" onclick="openEditModal('${credit._id}')">Edit</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteSale('${credit._id}')">Delete</button>
                                `}
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Failed to load credit sales:', error);
                document.getElementById('creditTable').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Failed to load credit sales</td></tr>';
            }
        }

        async function submitCreditSale(event) {
            event.preventDefault();
            
            const alertBox = document.getElementById('alert-box');
            const submitBtn = document.getElementById('submitBtn');
            
            const user = getUser();
            const creditData = {
                buyerName: document.getElementById('buyerName').value.trim(),
                nin: document.getElementById('nin').value.trim(),
                location: document.getElementById('location').value.trim(),
                contact: document.getElementById('contact').value.trim(),
                produceName: document.getElementById('produceName').value.trim(),
                produceType: document.getElementById('produceType').value.trim(),
                tonnage: parseFloat(document.getElementById('tonnage').value),
                amountDue: parseFloat(document.getElementById('amountDue').value),
                salesAgent: document.getElementById('salesAgent').value.trim(),
                dispatchDate: document.getElementById('dispatchDate').value,
                dueDate: document.getElementById('dueDate').value,
                branch: user.branch
            };

            const procurementId = document.getElementById('procurementId').value.trim();
            if (procurementId) {
                creditData.procurementId = procurementId;
            }

            setLoading(submitBtn, true);
            alertBox.innerHTML = '';

            try {
                await apiRequest('/sales/credit', {
                    method: 'POST',
                    body: JSON.stringify(creditData)
                });

                showToast('Credit sale recorded successfully!', 'success');
                clearForm('creditSaleForm');
                
                // Reset defaults
                const now = new Date();
                document.getElementById('dispatchDate').valueAsDate = now;
                const dueDate = new Date();
                dueDate.setDate(dueDate.getDate() + 30);
                document.getElementById('dueDate').valueAsDate = dueDate;
                document.getElementById('salesAgent').value = user.name || '';
                
                await loadRecentCredits();
            } catch (error) {
                alertBox.innerHTML = `<div class="alert alert-error">${error.message || 'Failed to record credit sale'}</div>`;
            } finally {
                setLoading(submitBtn, false);
            }
        }

        function openEditModal(saleId) {
            apiRequest('/sales/credit?limit=100').then(data => {
                const creditSales = data.data || [];
                const sale = creditSales.find(s => s._id === saleId);
                if (!sale) {
                    showToast('Credit sale not found', 'error');
                    return;
                }

                document.getElementById('edit-saleId').value = sale._id;
                document.getElementById('edit-buyerName').value = sale.buyerName;
                document.getElementById('edit-nin').value = sale.nin;
                document.getElementById('edit-location').value = sale.location;
                document.getElementById('edit-contact').value = sale.contact;
                document.getElementById('edit-produceName').value = sale.produceName;
                document.getElementById('edit-produceType').value = sale.produceType;
                document.getElementById('edit-tonnage').value = sale.tonnage;
                document.getElementById('edit-amountDue').value = sale.amountDue;
                document.getElementById('edit-salesAgent').value = sale.salesAgent;
                document.getElementById('edit-dispatchDate').value = sale.dispatchDate.split('T')[0];
                document.getElementById('edit-dueDate').value = sale.dueDate.split('T')[0];

                document.getElementById('editModal').style.display = 'flex';
            }).catch(error => {
                showToast('Failed to load credit sale details', 'error');
            });
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            document.getElementById('edit-alert-box').innerHTML = '';
        }

        async function updateSale(event) {
            event.preventDefault();
            
            const saleId = document.getElementById('edit-saleId').value;
            const updateBtn = document.getElementById('updateBtn');
            const alertBox = document.getElementById('edit-alert-box');
            
            const updateData = {
                buyerName: document.getElementById('edit-buyerName').value.trim(),
                nin: document.getElementById('edit-nin').value.trim(),
                location: document.getElementById('edit-location').value.trim(),
                contact: document.getElementById('edit-contact').value.trim(),
                produceName: document.getElementById('edit-produceName').value.trim(),
                produceType: document.getElementById('edit-produceType').value.trim(),
                tonnage: parseFloat(document.getElementById('edit-tonnage').value),
                amountDue: parseFloat(document.getElementById('edit-amountDue').value),
                salesAgent: document.getElementById('edit-salesAgent').value.trim(),
                dispatchDate: document.getElementById('edit-dispatchDate').value,
                dueDate: document.getElementById('edit-dueDate').value
            };

            setLoading(updateBtn, true);
            alertBox.innerHTML = '';

            try {
                await apiRequest(`/sales/credit/${saleId}`, {
                    method: 'PUT',
                    body: JSON.stringify(updateData)
                });

                showToast('Credit sale updated successfully!', 'success');
                closeEditModal();
                await loadRecentCredits();
            } catch (error) {
                alertBox.innerHTML = `<div class="alert alert-error">${error.message || 'Failed to update credit sale'}</div>`;
            } finally {
                setLoading(updateBtn, false);
            }
        }

        async function deleteSale(saleId) {
            if (!confirm('Are you sure you want to delete this credit sale? The inventory will be restored.')) {
                return;
            }

            try {
                await apiRequest(`/sales/credit/${saleId}`, {
                    method: 'DELETE'
                });

                showToast('Credit sale deleted successfully!', 'success');
                await loadRecentCredits();
            } catch (error) {
                showToast(error.message || 'Failed to delete credit sale', 'error');
            }
        }

        async function restoreSale(saleId) {
            if (!confirm('Are you sure you want to restore this credit sale?')) {
                return;
            }

            try {
                await apiRequest(`/sales/credit/${saleId}/restore`, {
                    method: 'POST'
                });

                showToast('Credit sale restored successfully!', 'success');
                await loadRecentCredits();
            } catch (error) {
                showToast(error.message || 'Failed to restore credit sale', 'error');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
