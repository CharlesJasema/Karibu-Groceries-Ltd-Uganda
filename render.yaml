services:
  # Web Service
  - type: web
    name: kgl-groceries-system
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        value: brocharles001@gmail.com
      - key: EMAIL_PASSWORD
        sync: false
      - key: SMS_API_KEY
        sync: false
      - key: SMS_USERNAME
        value: sandbox
      - key: SMS_SENDER_ID
        value: AFRICASTKNG
      - key: DEFAULT_USER_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: LOG_FILE
        value: logs/app.log
      - key: DATABASE_URI
        fromDatabase:
          name: kgl-mongodb
          property: connectionString
      - key: CLIENT_URL
        fromService:
          type: web
          name: kgl-groceries-system
          property: host

databases:
  # MongoDB Database
  - name: kgl-mongodb
    databaseName: karibu_groceries_db
    user: kgl_user
    plan: free
