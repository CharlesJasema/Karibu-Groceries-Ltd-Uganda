version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: kgl-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password_here
      MONGO_INITDB_DATABASE: karibu_groceries_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - kgl-network

  api:
    build: .
    container_name: kgl-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URI: mongodb://admin:${MONGODB_PASSWORD}@mongodb:27017/karibu_groceries_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      PORT: 3000
    depends_on:
      - mongodb
    networks:
      - kgl-network
    volumes:
      - ./logs:/app/logs

volumes:
  mongodb_data:
  mongodb_config:

networks:
  kgl-network:
    driver: bridge
